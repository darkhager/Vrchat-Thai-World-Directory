name: Discord open alerts

# Apps Script is the clock — its 5-min trigger fires repository_dispatch the moment a
# venue opens. GitHub's `schedule` cron is best-effort (it was firing ~every 2h, so the
# old 10-min detection window missed ~91% of openings); repository_dispatch is not
# throttled. Apps Script can't reach Discord (Cloudflare 40333), so this Action relays.
on:
  repository_dispatch:
    types: [venue-open]
  workflow_dispatch:
    inputs:
      test:
        description: 'Send a one-off test alert now'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: discord-open-alerts
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Send alerts
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # via env, never inlined into `run:` — client_payload is untrusted input
          ALERT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          TEST_SEND: ${{ inputs.test && '1' || '' }}
        run: node notify/notify.mjs
